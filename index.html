<!DOCTYPE html>
<html>
<head>
  <title>Wildlife Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; background: #0f172a; color: white; margin: 0; }
    h1 { text-align: center; padding: 10px; }
    #map { height: 50vh; margin: 10px; border-radius: 10px; }
    table { width: 90%; margin: 10px auto; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #444; text-align: center; }
    th { background: #1e293b; }
    .zone { color: #38bdf8; font-weight: bold; }
  </style>
</head>

<body>

<h1>Wildlife Monitoring Dashboard</h1>
<div id="map"></div>

<table>
  <thead>
    <tr><th>Animal</th><th>Zone</th></tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const zones = {
    "Forest_North": [33.12, 74.56],
    "Forest_South": [33.05, 74.60],
    "Village_West": [33.10, 74.50],
    "Village_East": [33.10, 74.65]
  };

  const map = L.map('map').setView([33.1, 74.55], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  let markers = {};

  async function fetchData() {
    try {
      console.log("📡 Fetching data...");

      const res = await fetch("/api/data");
      const data = await res.json();

      console.log("✅ Data received:", data);

      updateTable(data);
      updateMap(data);

    } catch (err) {
      console.error("❌ Fetch error:", err);
    }
  }

  function updateTable(data) {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    for (let animal in data) {
      console.log(`📊 Table update → ${animal}: ${data[animal]}`);

      table.innerHTML += `
        <tr>
          <td>${animal}</td>
          <td class="zone">${data[animal]}</td>
        </tr>
      `;
    }
  }

  function updateMap(data) {
    for (let animal in data) {
      const zone = data[animal];
      const coords = zones[zone];

      if (!coords) {
        console.warn("⚠ Unknown zone:", zone);
        continue;
      }

      if (markers[animal]) {
        markers[animal].setLatLng(coords);
      } else {
        markers[animal] = L.marker(coords)
          .addTo(map)
          .bindPopup(animal + " → " + zone);
      }

      console.log(`🗺 Marker updated → ${animal} @ ${zone}`);
    }
  }

  setInterval(fetchData, 5000);
  fetchData();
</script>

</body>
</html>
